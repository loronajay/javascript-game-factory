<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jay's Javascript Arcade | Player Page</title>
  <link rel="stylesheet" href="../css/arcade.css">
</head>
<body class="me-page-shell">
  <div class="scanlines"></div>
  <div class="crt-overlay"></div>

  <main class="arcade-shell">
    <section class="me-stage">
      <div class="me-stage__stars" aria-hidden="true"></div>
      <div class="me-stage__scene" aria-hidden="true">
        <div class="me-stage__sun"></div>
        <div class="me-stage__skyline"></div>
        <div class="me-stage__floor"></div>
      </div>

      <div class="me-stage__controls">
        <a class="grid-stage__back" href="../grid.html">&#x276E; Arcade Grid</a>
        <button
          id="playerProfileButton"
          class="profile-chip"
          type="button"
          aria-controls="playerProfilePanel"
          aria-expanded="false"
        >
          <span class="profile-chip__kicker">Factory Pilot</span>
          <span id="playerProfileSummary" class="profile-chip__name">UNNAMED PILOT</span>
        </button>
      </div>

      <div class="me-stage__header">
        <h1 class="pixel-text pixel-text--title me-stage__title">PLAYER PAGE</h1>
        <p class="me-stage__subtitle">Your corner of the arcade floor.</p>
      </div>

      <aside id="playerProfilePanel" class="player-card" hidden>
        <div class="player-card__topline">
          <p class="player-card__brand">Javascript Game Factory</p>
          <button id="playerProfileClose" class="player-card__close" type="button">Close</button>
        </div>
        <h2 class="pixel-text player-card__title">PLAYER CARD</h2>
        <p id="playerProfileStatus" class="player-card__status">SET YOUR DEFAULT ARCADE NAME</p>

        <div class="player-card__meta">
          <div class="player-card__meta-block">
            <span class="player-card__meta-label">Factory ID</span>
            <span id="playerProfileId" class="player-card__meta-value">PENDING-ID</span>
          </div>
          <div class="player-card__meta-block">
            <span class="player-card__meta-label">Arcade Default</span>
            <span id="playerProfileDefault" class="player-card__meta-value">UNNAMED PILOT</span>
          </div>
        </div>

        <form id="playerProfileForm" class="player-card__form">
          <label class="player-card__field" for="playerProfileName">Arcade Name</label>
          <input
            id="playerProfileName"
            class="player-card__input"
            name="profileName"
            type="text"
            maxlength="12"
            autocomplete="nickname"
            spellcheck="false"
          >
          <p id="playerProfileHint" class="player-card__hint">
            This becomes your default online identity across the arcade. Games can still use temporary match aliases.
          </p>
          <div class="player-card__actions">
            <button class="player-card__action player-card__action--primary" type="submit">
              <span id="playerProfileSaveLabel">STORE CARD</span>
            </button>
            <button id="playerProfileClear" class="player-card__action" type="button">CLEAR NAME</button>
          </div>
          <p id="playerProfileFlash" class="player-card__flash" aria-live="polite"></p>
        </form>
      </aside>

      <div class="me-layout">
        <section id="meHeroCard" class="me-hero-card"></section>
        <section id="meLinksPanel" class="me-panel"></section>
        <section id="meFavoriteGamePanel" class="me-panel"></section>
        <section id="meRankingsPanel" class="me-panel"></section>
        <section id="meFriendsPanel" class="me-panel"></section>
        <section id="meActivityPanel" class="me-panel"></section>
      </div>
    </section>
  </main>

  <script src="../js/pixel-text.js"></script>
  <script src="../js/arcade-input.js"></script>
  <script type="module" src="../js/arcade-me.mjs"></script>
</body>
</html>
