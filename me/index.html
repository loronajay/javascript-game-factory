<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jay's Javascript Arcade | Player Page</title>
  <link rel="stylesheet" href="../css/arcade.css">
  <link rel="stylesheet" href="../css/session-nav.css">
  <link rel="stylesheet" href="../css/profile-stage.css">
  <link rel="stylesheet" href="../css/profile-hero.css">
  <link rel="stylesheet" href="../css/profile-hero-card.css">
  <link rel="stylesheet" href="../css/profile-featured-cabinet.css">
  <link rel="stylesheet" href="../css/profile-identity.css">
  <link rel="stylesheet" href="../css/profile-rail.css">
  <link rel="stylesheet" href="../css/profile-page.css">
  <link rel="stylesheet" href="../css/profile-social.css">
  <link rel="stylesheet" href="../css/profile-music.css">
  <link rel="stylesheet" href="../css/me.css">
  <link rel="stylesheet" href="../css/thoughts.css">
  <link rel="stylesheet" href="../css/gallery-viewer.css">
  <link rel="stylesheet" href="../css/notifications.css">
  <link rel="stylesheet" href="../css/page-stage.css">
</head>
<body class="me-page-shell">
  <div class="scanlines"></div>
  <div class="crt-overlay"></div>

  <main class="arcade-shell">
    <section class="me-stage">
      <div class="me-stage__stars" aria-hidden="true"></div>
      <div class="me-stage__scene" aria-hidden="true">
        <div class="me-stage__sun"></div>
        <div class="me-stage__skyline"></div>
        <div class="me-stage__floor"></div>
      </div>

      <div class="me-stage__controls page-stage__controls">
        <div id="mePrimaryNav" class="me-stage__nav page-stage__nav"></div>
      </div>

      <a
        href="edit/"
        class="profile-chip me-stage__edit-chip"
      >
        <span class="profile-chip__kicker">Owner Controls</span>
        <span class="profile-chip__name">Edit Profile</span>
      </a>

      <div class="me-stage__header page-stage__header">
        <h1 id="meStageTitle" class="pixel-text pixel-text--title me-stage__title">UNNAMED PILOT</h1>
        <p id="meStageSubtitle" class="me-stage__subtitle">No tagline set yet.</p>
      </div>

      <div class="me-layout page-stage__layout">
        <div class="me-layout__main">
          <section id="meHeroCard" class="me-hero-card"></section>
          <section id="meIdentityPanel" class="me-panel me-panel--identity"></section>
          <section id="meRankingsPanel" class="me-panel me-panel--rankings"></section>
          <section id="meTopFriendsPanel" class="me-panel me-panel--top-friends"></section>
          <section id="meFriendsPanel" class="me-panel me-panel--friends"></section>
        </div>
        <div class="me-layout__side me-layout__side--middle">
          <section id="meMusicPanel" class="me-panel me-panel--music" hidden></section>
          <section id="meFavoriteGamePanel" class="me-panel me-panel--favorite"></section>
          <section id="meFriendCodePanel" class="me-panel me-panel--friend-code"></section>
          <section id="meGalleryPanel" class="me-panel me-panel--gallery"></section>
        </div>
        <div class="me-layout__side me-layout__side--right">
          <section id="meAboutPanel" class="me-panel me-panel--about"></section>
          <section id="meBadgesPanel" class="me-panel me-panel--badges"></section>
          <section id="meThoughtsPanel" class="me-panel me-panel--thoughts"></section>
        </div>
      </div>
    </section>
  </main>

  <script src="../js/pixel-text.js"></script>
  <script src="../js/arcade-input.js"></script>
  <script src="../js/platform-config.js"></script>
  <script type="module" src="../js/arcade-me.mjs"></script>
</body>
</html>
