<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jay's Javascript Arcade | Sign In</title>
  <link rel="stylesheet" href="../css/arcade.css">
  <link rel="stylesheet" href="../css/profile-editor-card.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="auth-page-shell">
  <div class="scanlines"></div>
  <div class="crt-overlay"></div>

  <main class="arcade-shell">
    <section class="auth-stage">
      <div class="auth-stage__stars" aria-hidden="true"></div>
      <div class="auth-stage__scene" aria-hidden="true">
        <div class="auth-stage__sun"></div>
        <div class="auth-stage__skyline"></div>
        <div class="auth-stage__floor"></div>
      </div>

      <div class="auth-stage__controls">
        <nav class="auth-stage__nav">
          <a class="auth-stage__back" href="../index.html">&#x276E; Home</a>
          <a class="auth-stage__portal" href="../grid.html">Arcade Grid</a>
        </nav>
      </div>

      <div class="auth-stage__header">
        <h1 class="pixel-text pixel-text--title auth-stage__title">SIGN IN</h1>
        <p class="auth-stage__subtitle">Welcome back, pilot.</p>
      </div>

      <div class="auth-layout">
        <div class="auth-card">
          <p class="auth-card__brand">Javascript Game Factory</p>
          <h2 class="pixel-text auth-card__title">ACCESS TERMINAL</h2>

          <p id="authFlash" class="auth-card__flash" role="alert" aria-live="polite"></p>

          <form id="signInForm" class="player-card__form" novalidate>
            <label class="player-card__field" for="signInEmail">Email</label>
            <input
              id="signInEmail"
              class="player-card__input"
              type="email"
              name="email"
              autocomplete="email"
              placeholder="pilot@example.com"
              required
            >

            <label class="player-card__field" for="signInPassword">Password</label>
            <input
              id="signInPassword"
              class="player-card__input"
              type="password"
              name="password"
              autocomplete="current-password"
              placeholder="••••••••"
              required
            >

            <div class="auth-card__actions">
              <button id="signInSubmit" class="auth-card__submit" type="submit">Sign In</button>
              <a class="auth-card__switch" href="../forgot-password/index.html">Forgot your password? &rsaquo;</a>
              <a class="auth-card__switch" href="../sign-up/index.html">New here? Create an account &rsaquo;</a>
            </div>
          </form>
        </div>
      </div>
    </section>
  </main>

  <script src="../js/pixel-text.js"></script>
  <script src="../js/platform-config.js"></script>
  <script type="module" src="../js/arcade-sign-in.mjs"></script>
</body>
</html>
