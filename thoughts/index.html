<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jay's Javascript Arcade | Arcade Thoughts</title>
  <link rel="stylesheet" href="../css/arcade.css">
  <link rel="stylesheet" href="../css/thoughts.css">
</head>
<body class="thoughts-page-shell">
  <div class="scanlines"></div>
  <div class="crt-overlay"></div>

  <main class="arcade-shell">
    <section class="thoughts-stage">
      <div class="thoughts-stage__stars" aria-hidden="true"></div>
      <div class="thoughts-stage__scene" aria-hidden="true">
        <div class="thoughts-stage__sun"></div>
        <div class="thoughts-stage__skyline"></div>
        <div class="thoughts-stage__floor"></div>
      </div>

      <div class="thoughts-stage__controls">
        <div id="thoughtsPrimaryNav" class="thoughts-stage__nav"></div>
      </div>

      <div class="thoughts-stage__header">
        <h1 class="pixel-text pixel-text--title thoughts-stage__title">ARCADE THOUGHTS</h1>
        <p class="thoughts-stage__subtitle">Player status posts and social signals from across the arcade.</p>
      </div>

      <div class="thoughts-layout">
        <section id="thoughtsHeroCard" class="thoughts-hero-card"></section>
        <section id="thoughtsFeed" class="thoughts-feed"></section>
      </div>
    </section>
  </main>

  <script src="../js/pixel-text.js"></script>
  <script src="../js/arcade-input.js"></script>
  <script src="../js/platform-config.js"></script>
  <script type="module" src="../js/thoughts-page/page.mjs"></script>
</body>
</html>
