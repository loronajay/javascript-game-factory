<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jay's Javascript Arcade | Notifications</title>
  <link rel="stylesheet" href="../css/arcade.css">
  <link rel="stylesheet" href="../css/search.css">
  <link rel="stylesheet" href="../css/notifications.css">
  <style>
    .notif-page-layout {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 620px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .notif-page__empty {
      padding: 40px 0;
      text-align: center;
      color: rgba(200, 180, 255, 0.35);
      font-family: var(--font-display);
      font-size: 0.8rem;
      letter-spacing: 0.06em;
    }

    .notif-page__flash {
      min-height: 1em;
      color: #88aacc;
      font-size: 0.82rem;
      font-family: var(--font-display);
      letter-spacing: 0.06em;
      padding: 12px 0;
    }

    /* Expand the bell dropdown item styles for full-width page use */
    #notifPageList .notif-item {
      background: rgba(10, 0, 21, 0.75);
      border: 1px solid rgba(255, 0, 255, 0.1);
      border-radius: 0;
      padding: 14px 18px;
    }

    #notifPageList .notif-item--unread {
      background: rgba(255, 0, 255, 0.04);
      border-left: 3px solid rgba(255, 0, 255, 0.5);
    }

    #notifPageList .notif-item:hover {
      background: rgba(255, 0, 255, 0.06);
    }

    #notifPageList .notif-item__text {
      font-size: 0.84rem;
    }

    #notifPageList .notif-item__preview {
      font-size: 0.76rem;
    }

    #notifPageList .notif-item__time {
      font-size: 0.68rem;
      margin-top: 6px;
    }
  </style>
</head>
<body class="search-page-shell">
  <div class="scanlines"></div>
  <div class="crt-overlay"></div>

  <main class="arcade-shell">
    <section class="search-stage">
      <div class="search-stage__stars" aria-hidden="true"></div>
      <div class="search-stage__scene" aria-hidden="true">
        <div class="search-stage__sun"></div>
        <div class="search-stage__skyline"></div>
        <div class="search-stage__floor"></div>
      </div>

      <div class="search-stage__controls">
        <nav class="search-stage__nav">
          <a class="search-stage__back" href="#" onclick="event.preventDefault(); history.back()">&#x276E; Back</a>
          <a class="search-stage__portal" href="../grid.html">Arcade Grid</a>
          <a class="search-stage__portal" href="../me/index.html">Player Page</a>
          <div id="notifPageNav" class="session-nav" style="margin-left:auto;"></div>
        </nav>
      </div>

      <div class="search-stage__header">
        <h1 class="pixel-text pixel-text--title search-stage__title">NOTIFICATIONS</h1>
        <p class="search-stage__subtitle">Everything that's happened while you were away.</p>
      </div>

      <div class="notif-page-layout">
        <p id="notifPageFlash" class="notif-page__flash"></p>
        <ul id="notifPageList" role="list" aria-label="Notifications"></ul>
      </div>
    </section>
  </main>

  <script src="../js/pixel-text.js"></script>
  <script src="../js/platform-config.js"></script>
  <script type="module" src="../js/arcade-notifications-page.mjs"></script>
</body>
</html>
