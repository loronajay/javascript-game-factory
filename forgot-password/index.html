<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jay's Javascript Arcade | Forgot Password</title>
  <link rel="stylesheet" href="../css/arcade.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="auth-page-shell">
  <div class="scanlines"></div>
  <div class="crt-overlay"></div>

  <main class="arcade-shell">
    <section class="auth-stage">
      <div class="auth-stage__stars" aria-hidden="true"></div>
      <div class="auth-stage__scene" aria-hidden="true">
        <div class="auth-stage__sun"></div>
        <div class="auth-stage__skyline"></div>
        <div class="auth-stage__floor"></div>
      </div>

      <div class="auth-stage__controls">
        <nav class="auth-stage__nav">
          <a class="auth-stage__back" href="../sign-in/index.html">&#x276E; Sign In</a>
          <a class="auth-stage__portal" href="../index.html">Home</a>
        </nav>
      </div>

      <div class="auth-stage__header">
        <h1 class="pixel-text pixel-text--title auth-stage__title">FORGOT PASSWORD</h1>
        <p class="auth-stage__subtitle">We'll send a reset link to your email.</p>
      </div>

      <div class="auth-layout">
        <div class="auth-card">
          <p class="auth-card__brand">Javascript Game Factory</p>
          <h2 class="pixel-text auth-card__title">RECOVERY</h2>

          <p id="authFlash" class="auth-card__flash" role="alert" aria-live="polite"></p>

          <form id="forgotPasswordForm" class="player-card__form" novalidate>
            <label class="player-card__field" for="forgotEmail">Email</label>
            <input
              id="forgotEmail"
              class="player-card__input"
              type="email"
              name="email"
              autocomplete="email"
              placeholder="pilot@example.com"
              required
            >

            <div class="auth-card__actions">
              <button id="forgotSubmit" class="auth-card__submit" type="submit">Send Reset Link</button>
              <a class="auth-card__switch" href="../sign-in/index.html">Back to sign in &rsaquo;</a>
            </div>
          </form>
        </div>
      </div>
    </section>
  </main>

  <script src="../js/pixel-text.js"></script>
  <script src="../js/platform-config.js"></script>
  <script type="module" src="../js/arcade-forgot-password.mjs"></script>
</body>
</html>
