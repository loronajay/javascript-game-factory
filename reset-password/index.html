<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jay's Javascript Arcade | Reset Password</title>
  <link rel="stylesheet" href="../css/arcade.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="auth-page-shell">
  <div class="scanlines"></div>
  <div class="crt-overlay"></div>

  <main class="arcade-shell">
    <section class="auth-stage">
      <div class="auth-stage__stars" aria-hidden="true"></div>
      <div class="auth-stage__scene" aria-hidden="true">
        <div class="auth-stage__sun"></div>
        <div class="auth-stage__skyline"></div>
        <div class="auth-stage__floor"></div>
      </div>

      <div class="auth-stage__controls">
        <nav class="auth-stage__nav">
          <a class="auth-stage__back" href="../sign-in/index.html">&#x276E; Sign In</a>
          <a class="auth-stage__portal" href="../index.html">Home</a>
        </nav>
      </div>

      <div class="auth-stage__header">
        <h1 class="pixel-text pixel-text--title auth-stage__title">RESET PASSWORD</h1>
        <p class="auth-stage__subtitle">Enter your new password below.</p>
      </div>

      <div class="auth-layout">
        <div class="auth-card">
          <p class="auth-card__brand">Javascript Game Factory</p>
          <h2 class="pixel-text auth-card__title">NEW ACCESS CODE</h2>

          <p id="authFlash" class="auth-card__flash" role="alert" aria-live="polite"></p>

          <form id="resetPasswordForm" class="player-card__form" novalidate>
            <label class="player-card__field" for="resetPassword">New Password</label>
            <input
              id="resetPassword"
              class="player-card__input"
              type="password"
              name="newPassword"
              autocomplete="new-password"
              placeholder="••••••••"
              required
            >
            <p class="player-card__hint">Minimum 8 characters.</p>

            <label class="player-card__field" for="resetPasswordConfirm">Confirm Password</label>
            <input
              id="resetPasswordConfirm"
              class="player-card__input"
              type="password"
              name="confirmPassword"
              autocomplete="new-password"
              placeholder="••••••••"
              required
            >

            <div class="auth-card__actions">
              <button id="resetSubmit" class="auth-card__submit" type="submit">Set New Password</button>
            </div>
          </form>
        </div>
      </div>
    </section>
  </main>

  <script src="../js/pixel-text.js"></script>
  <script src="../js/platform-config.js"></script>
  <script type="module" src="../js/arcade-reset-password.mjs"></script>
</body>
</html>
