<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#140d06">
    <title>Tactical Arena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800;900&family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500,600&display=swap">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div id="app">
      <section class="match-screen is-active">
        <header class="topbar">
          <div class="brand">Tactical Arena</div>
          <div id="turnBanner" class="turn-banner">
            <div id="turnTitle" class="turn-title">Player 1 squad turn</div>
            <div id="turnSub" class="turn-sub">Select an unspent piece</div>
          </div>
          <div class="top-actions">
            <button id="muteBtn" type="button" aria-pressed="false" title="Toggle sound">Sound</button>
            <button id="rulesBtn" type="button">Codex</button>
            <button id="restartBtn" class="danger" type="button">Restart</button>
          </div>
        </header>

        <main id="stageWrap">
          <svg id="boardSvg" viewBox="0 0 1200 760" aria-label="Tactical Arena board" role="grid">
            <defs>
              <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
                <feGaussianBlur stdDeviation="5" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <radialGradient id="boardAura" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#f0c878" stop-opacity=".22"/>
                <stop offset="100%" stop-color="#f0c878" stop-opacity="0"/>
              </radialGradient>
              <linearGradient id="pewter" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#fdf8ea"/><stop offset="42%" stop-color="#ece1c4"/><stop offset="100%" stop-color="#bba87f"/>
              </linearGradient>
            </defs>
            <ellipse id="boardGlow" cx="600" cy="440" rx="420" ry="210" fill="url(#boardAura)"/>
            <g id="boardLayer"></g>
            <g id="unitsLayer"></g>
            <g id="forecastLayer"></g>
            <g id="effectsLayer"></g>
          </svg>
          <div id="diceOverlay" aria-hidden="true"><div id="dieFace" class="die">⚔</div></div>
          <div id="squadOverlays" class="squad-overlays"></div>
          <div id="message" role="status" aria-live="polite">Select an unspent piece.</div>
        </main>

        <footer class="hud">
          <section class="panel command-console">
            <div id="unitCard" class="unit-card">
              <div class="unit-emblem">?</div>
              <div><div class="unit-name">No piece selected</div><div class="unit-meta">Choose an unspent unit on the board.</div><div class="hpbar"><div class="hpfill" style="width:0%"></div></div></div>
            </div>
            <div id="actions" class="actions"></div>
            <div id="actionHelp" class="action-help">Select an unspent piece.</div>
          </section>
        </footer>
      </section>
    </div>

    <!-- Field codex — stats, passives, ARTS, and status glossary for every unit.
         Built from the unit catalog in main.js so it never drifts from balance
         data. Reachable from the topbar "Codex" button. -->
    <div id="refModal" class="ref-modal" hidden>
      <div class="ref-card">
        <header class="ref-head">
          <h2>Field Codex</h2>
          <button id="refCloseBtn" class="ref-close" type="button" aria-label="Close">✕</button>
        </header>
        <div id="refBody" class="ref-body"></div>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
