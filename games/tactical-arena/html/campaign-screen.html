      <!-- ============================ CAMPAIGN ============================ -->
      <section class="screen menu-screen" data-screen="campaign">
        <div class="menu-card campaign-card">
          <header class="campaign-head">
            <div>
              <h2 class="menu-heading">Campaign</h2>
              <p class="menu-note">Cross the map, earn stars, and unlock units from canon missions.</p>
            </div>
            <div class="campaign-star-bank" data-campaign-stars>0 stars</div>
          </header>
          <div class="campaign-layout">
            <div class="campaign-map" data-campaign-map aria-label="Campaign map"></div>
            <aside class="campaign-panel">
              <div class="campaign-detail" data-campaign-detail></div>
              <div class="setup-field">
                <span class="setup-label">Mission Squad</span>
                <div class="campaign-squad" data-campaign-squad></div>
              </div>
              <div class="menu-buttons">
                <button type="button" data-action="startCampaignMission" class="primary menu-btn">Start Mission</button>
                <button data-nav="mainMenu" class="menu-btn ghost">Back</button>
              </div>
            </aside>
          </div>
        </div>
      </section>
