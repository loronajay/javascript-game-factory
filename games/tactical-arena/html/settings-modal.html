    <!-- Settings — presentation-only audio preferences. -->
    <div id="settingsModal" class="ref-modal" hidden>
      <div class="ref-card settings-card">
        <header class="ref-head">
          <div class="ref-head-title">
            <h2>Settings</h2>
            <button id="setCloseBtn" class="ref-close" type="button" aria-label="Close">✕</button>
          </div>
        </header>
        <div class="ref-body settings-body">
          <label class="set-row">
            <span class="set-label">Theme</span>
            <select id="setTheme" class="set-select"></select>
          </label>
          <label class="set-row">
            <span class="set-label">Sound</span>
            <input id="setSoundToggle" type="checkbox" checked>
          </label>
          <label class="set-row">
            <span class="set-label">Battery saver</span>
            <input id="setBatterySaver" type="checkbox">
          </label>
          <label class="set-row">
            <span class="set-label">Effects volume</span>
            <input id="setSfxVolume" type="range" min="0" max="100" value="85">
          </label>
          <label class="set-row">
            <span class="set-label">Music volume</span>
            <input id="setMusicVolume" type="range" min="0" max="100" value="32">
          </label>
          <div class="set-row set-action-row">
            <span class="set-label">Progress</span>
            <div class="set-action-stack">
              <button id="setResetProgressBtn" class="menu-btn danger" type="button">Reset Progress</button>
              <span id="setProgressStatus" class="set-hint" aria-live="polite"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
