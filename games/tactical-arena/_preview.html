<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="./style.css">
<style>
  body { margin:0; background:
      radial-gradient(circle at 50% 20%, rgba(20,50,90,.25), transparent 50%),
      linear-gradient(180deg,#0e1520,#060c14); }
  .wrap { padding: 12px 10px; }
  h2 { color:#bcd6ec; font:800 14px "Cinzel",serif; letter-spacing:.14em; text-transform:uppercase; margin:6px 0 0 14px; }
  svg { display:block; width:100%; height:auto; }
</style>
</head>
<body>
<div class="wrap">
  <h2>Tactical Arena — unit figurines</h2>
  <svg id="stage" viewBox="0 0 1160 540" aria-label="units">
    <defs>
      <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
        <feGaussianBlur stdDeviation="5" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <linearGradient id="pewter" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#e0eef8"/><stop offset="42%" stop-color="#a8c4dc"/><stop offset="100%" stop-color="#6888a0"/>
      </linearGradient>
      <linearGradient id="ivory" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#f6f1e3"/><stop offset="46%" stop-color="#e3d9c2"/><stop offset="100%" stop-color="#b9ac8e"/>
      </linearGradient>
      <linearGradient id="figSteel" x1="0" y1="0" x2="0.3" y2="1">
        <stop offset="0%" stop-color="#eef4fb"/><stop offset="45%" stop-color="#aebfd0"/><stop offset="100%" stop-color="#5d6c7c"/>
      </linearGradient>
      <linearGradient id="figGold" x1="0" y1="0" x2="0.2" y2="1">
        <stop offset="0%" stop-color="#f4dfa0"/><stop offset="48%" stop-color="#cb9f55"/><stop offset="100%" stop-color="#876026"/>
      </linearGradient>
    </defs>
  </svg>
</div>
<script type="module">
  import { createUnitFigure } from "./src/ui/unitRenderer.js";
  const SVG="http://www.w3.org/2000/svg";
  const stage=document.getElementById("stage");
  const metrics={ tileWidth:68, tileHeight:34, depth:10, originX:0, originY:0 };
  const types=["swordsman","archer","mystic","magician","paladin"];
  function el(n,a){const e=document.createElementNS(SVG,n);for(const k in a)e.setAttribute(k,a[k]);return e;}
  let col=0;
  for(const type of types){
    const x=110+col*200;
    [1,2].forEach((player,row)=>{
      const cy=150+row*240;
      const fake={ id:`${type}-${player}`, type, player, position:{x:0,y:0}, hp:20, statModifiers:{}, statuses:[], spent:false, defending:false };
      const token=createUnitFigure(metrics, fake, { isTarget:false, selectedId:null, onUnitClick(){}, state:null });
      token.setAttribute("transform",`translate(${x} ${cy}) scale(2.6)`);
      stage.appendChild(token);
      const label=el("text",{x, y: cy+92, "text-anchor":"middle", fill:"#9fb6c8", "font-family":"Cinzel, serif", "font-size":12, "font-weight":700, "letter-spacing":"0.08em"});
      label.textContent=type.toUpperCase();
      stage.appendChild(label);
    });
    col++;
  }
  window.__ready=true;
</script>
</body>
</html>
