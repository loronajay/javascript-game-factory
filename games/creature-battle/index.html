<body>

  <script src="creature-battler/scripts/init-game.js"></script>

  <script type="module">
    import { loadFactoryProfile } from '../../js/platform/identity/factory-profile.mjs';
    import { mountMobileController } from '../../js/mobile-controller.mjs';
    import { publishCreatureBattlerMatchActivity } from '../../js/platform/activity/activity.mjs';

    const profile = loadFactoryProfile();
    window.__factoryProfile = profile;

    window.__publishBattleResult = function(winner) {
      const myName = profile?.profileName || 'Player';
      publishCreatureBattlerMatchActivity({
        result: winner === 'player' ? 'win' : winner === 'draw' ? 'draw' : 'loss',
        myProfile: { playerId: profile?.playerId, displayName: myName },
        opponentProfile: { playerId: 'ai', displayName: 'CPU' },
        playerTeam: window.state?.playerTeam || [],
        opponentTeam: window.state?.opponentTeam || [],
        sessionId: `cb-${Date.now()}`,
      });
    };

    mountMobileController({ profileId: 'creature-battler' });
  </script>
