<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Animation Viewer — Creature Battler</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/battle.css">
  <link rel="stylesheet" href="styles/animation-overlay.css">
  <link rel="stylesheet" href="styles/animations/anim-universal.css">
  <link rel="stylesheet" href="styles/animations/anim-salamander.css">
  <link rel="stylesheet" href="styles/animations/anim-aquaphant.css">
  <link rel="stylesheet" href="styles/animations/anim-pengun.css">
  <link rel="stylesheet" href="styles/animations/anim-flor.css">
  <link rel="stylesheet" href="styles/animations/anim-clod.css">
  <link rel="stylesheet" href="styles/animations/anim-galeon.css">
  <link rel="stylesheet" href="styles/animations/anim-voltwing.css">
  <link rel="stylesheet" href="styles/animations/anim-lumora.css">
  <link rel="stylesheet" href="styles/animations/anim-nocthorn.css">
  <link rel="stylesheet" href="styles/animations/anim-emberjaw.css">
  <link rel="stylesheet" href="styles/animations/anim-tidecalf.css">
  <link rel="stylesheet" href="styles/animations/anim-gravemoss.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      background: #0a0c10;
      color: #c8d0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    #av-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: #12161e;
      border-bottom: 1px solid #1e2430;
      flex-shrink: 0;
      z-index: 100;
    }
    .av-title { font-size: 14px; font-weight: 600; color: #8899cc; letter-spacing: 0.04em; }
    .av-btn {
      background: #1e2430;
      border: 1px solid #2a3448;
      color: #a0b0cc;
      padding: 5px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s, color 0.15s;
    }
    .av-btn:hover { background: #252e40; color: #d0ddf0; }
    .av-btn.primary { background: #2a4870; border-color: #3a6090; color: #a0d0ff; }
    .av-btn.primary:hover { background: #324f7a; }
    .av-btn.active { background: #1e3a60; border-color: #2a5080; color: #60b0ff; }
    .av-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Main layout ── */
    #av-main {
      display: grid;
      grid-template-columns: 260px 1fr 260px;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Left panel ── */
    #av-left {
      background: #10141c;
      border-right: 1px solid #1e2430;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .av-section {
      padding: 10px 12px 8px;
      border-bottom: 1px solid #1a2030;
    }
    .av-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #5566aa;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .av-creature-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
      align-items: center;
    }
    .av-creature-row + .av-creature-row { margin-top: 4px; }

    select.av-select {
      background: #1a2030;
      border: 1px solid #2a3448;
      color: #c0cce0;
      padding: 4px 6px;
      border-radius: 4px;
      font-size: 12px;
      width: 100%;
      cursor: pointer;
    }
    select.av-select:focus { outline: none; border-color: #4466aa; }

    select.av-level-select {
      background: #1a2030;
      border: 1px solid #2a3448;
      color: #88aacc;
      padding: 4px 6px;
      border-radius: 4px;
      font-size: 11px;
      width: 90px;
      cursor: pointer;
    }

    .av-swap-row {
      display: flex;
      justify-content: center;
      padding: 4px 0;
    }
    .av-swap-btn {
      background: none;
      border: 1px solid #2a3448;
      color: #556688;
      padding: 2px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 11px;
    }
    .av-swap-btn:hover { border-color: #4466aa; color: #8899cc; }

    /* ── Move picker ── */
    #av-move-section {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .av-tabs {
      display: flex;
      border-bottom: 1px solid #1a2030;
    }
    .av-tab {
      flex: 1;
      padding: 6px 4px;
      text-align: center;
      cursor: pointer;
      font-size: 11px;
      color: #556688;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .av-tab:hover { color: #8899cc; }
    .av-tab.active { color: #88ccff; border-bottom-color: #4488cc; }

    #av-move-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    #av-move-list::-webkit-scrollbar { width: 4px; }
    #av-move-list::-webkit-scrollbar-track { background: transparent; }
    #av-move-list::-webkit-scrollbar-thumb { background: #2a3448; border-radius: 2px; }

    .av-move-group-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #445566;
      text-transform: uppercase;
      padding: 8px 12px 3px;
    }
    .av-move-item {
      padding: 5px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      border-left: 2px solid transparent;
      transition: background 0.1s;
    }
    .av-move-item:hover { background: #151a24; }
    .av-move-item.selected { background: #14203a; border-left-color: #4488cc; }

    .av-move-name { flex: 1; color: #b0c0d8; font-size: 12px; }
    .av-move-lvl { font-size: 10px; color: #445566; }
    .av-move-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    }

    .av-move-item.selected .av-move-name { color: #c8deff; }
    .av-move-empty {
      padding: 16px 12px;
      color: #445566;
      font-style: italic;
      font-size: 12px;
    }

    /* ── Play controls ── */
    #av-controls {
      padding: 10px 12px;
      border-top: 1px solid #1a2030;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    #av-controls .av-btn { flex: 1; }

    /* ── Field ── */
    #av-field-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #080a10;
      position: relative;
    }

    #av-field-container {
      width: 560px;
      height: 315px;
      position: relative;
      flex-shrink: 0;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 4px 32px rgba(0,0,0,0.6);
    }

    .av-miss-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff6666;
      font-size: 22px;
      font-weight: 700;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 200;
      text-shadow: 0 0 10px rgba(255,100,100,0.8);
    }

    /* ── Right panel ── */
    #av-right {
      background: #10141c;
      border-left: 1px solid #1e2430;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    #av-right::-webkit-scrollbar { width: 4px; }
    #av-right::-webkit-scrollbar-thumb { background: #2a3448; border-radius: 2px; }

    .av-stat-block {
      padding: 10px 12px;
      border-bottom: 1px solid #1a2030;
    }

    .av-stat-creature-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .av-stat-creature-name { font-size: 13px; font-weight: 600; color: #c8d8f0; }
    .av-stat-creature-role { font-size: 10px; color: #445566; }

    .av-element-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 2px 6px;
      border-radius: 10px;
      text-transform: uppercase;
    }
    .elem-fire    { background: #3a1800; color: #ff8844; }
    .elem-ice     { background: #001830; color: #88ddff; }
    .elem-water   { background: #001a30; color: #44aaff; }
    .elem-gaia    { background: #102010; color: #88dd44; }
    .elem-earth   { background: #1a1400; color: #cc9944; }
    .elem-wind    { background: #0a1a10; color: #88ffbb; }
    .elem-light   { background: #1a1a00; color: #ffee88; }
    .elem-dark    { background: #0e0014; color: #cc88ff; }
    .elem-neutral { background: #1a1a1a; color: #888888; }

    .av-stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px 8px;
    }
    .av-stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2px 0;
    }
    .av-stat-key { font-size: 10px; color: #556688; }
    .av-stat-val { font-size: 11px; color: #a0b8d0; font-weight: 600; }
    .av-stat-val.highlight { color: #66aaff; }

    /* ── Move info ── */
    .av-move-info-block {
      padding: 10px 12px;
      border-bottom: 1px solid #1a2030;
    }
    .av-move-info-name {
      font-size: 14px;
      font-weight: 700;
      color: #c8deff;
      margin-bottom: 3px;
    }
    .av-move-info-desc {
      font-size: 11px;
      color: #556688;
      line-height: 1.4;
      margin-bottom: 8px;
    }
    .av-move-info-row {
      display: flex;
      justify-content: space-between;
      padding: 1px 0;
    }
    .av-move-info-key { font-size: 10px; color: #445566; }
    .av-move-info-val { font-size: 11px; color: #8899cc; }

    /* ── Damage estimate ── */
    .av-dmg-block {
      padding: 10px 12px;
      border-bottom: 1px solid #1a2030;
    }
    .av-dmg-header {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #5566aa;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .av-dmg-row {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
    }
    .av-dmg-label { font-size: 11px; color: #556688; }
    .av-dmg-value { font-size: 12px; font-weight: 700; }
    .av-dmg-value.dmg { color: #ff8844; }
    .av-dmg-value.crit { color: #ffcc44; }
    .av-dmg-value.heal { color: #66dd88; }
    .av-dmg-value.absorb { color: #88aaff; }
    .av-dmg-value.utility { color: #cc88ff; }

    .av-elem-modifier {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      margin-top: 6px;
    }
    .av-elem-modifier-badge {
      padding: 1px 6px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 10px;
    }
    .em-super   { background: #3a1800; color: #ff8844; }
    .em-absorb  { background: #001a40; color: #6699ff; }
    .em-resisted { background: #1a1000; color: #886644; }
    .em-neutral { background: #161820; color: #667788; }
    .em-sub     { background: #1a1500; color: #aa8833; }
    .em-sub-down { background: #101820; color: #557799; }

    /* ── History log ── */
    .av-log-block {
      padding: 8px 12px;
      flex: 1;
    }
    .av-log-header {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #5566aa;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .av-log-entry {
      font-size: 11px;
      color: #445566;
      padding: 2px 0;
      border-bottom: 1px solid #12161e;
      display: flex;
      justify-content: space-between;
    }
    .av-log-entry .log-move { color: #6677aa; }
    .av-log-entry .log-result { color: #88aa66; }
    .av-log-entry .log-crit { color: #ccaa44; }
    .av-log-entry .log-miss { color: #aa6644; }
    .av-log-entry .log-absorb { color: #6688cc; }

    /* category colors */
    .cat-art     { background: #2a1a40; }
    .cat-heal    { background: #1a2e1a; }
    .cat-utility { background: #1a1a2a; }
    .cat-basic   { background: #1a1a1a; }
    .cat-skill-offensive { background: #2e1a1a; }
    .cat-skill-setup     { background: #1a2a2e; }
    .cat-skill-defense   { background: #1a1a2e; }
    .cat-skill-utility   { background: #1a1e2a; }
    .cat-skill-reaction  { background: #2a1a2e; }
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <div id="av-header">
    <span class="av-title">Animation Viewer</span>
    <button id="av-play"  class="av-btn primary">▶ Play</button>
    <button id="av-loop"  class="av-btn">⟳ Loop</button>
    <button id="av-reset" class="av-btn">↺ Reset</button>
    <span style="flex:1"></span>
    <span style="font-size:11px;color:#334;padding-right:4px">actor = player-middle · target = opponent-middle</span>
  </div>

  <!-- ── Main ── -->
  <div id="av-main">

    <!-- Left panel: pickers -->
    <div id="av-left">
      <div class="av-section">
        <div class="av-section-label">Attacker</div>
        <div class="av-creature-row">
          <select id="av-attacker-creature" class="av-select"></select>
          <select id="av-attacker-level" class="av-level-select"></select>
        </div>
      </div>

      <div class="av-swap-row">
        <button class="av-swap-btn" id="av-swap-btn" title="Swap attacker and target">⇅ swap</button>
      </div>

      <div class="av-section">
        <div class="av-section-label">Target</div>
        <div class="av-creature-row">
          <select id="av-target-creature" class="av-select"></select>
          <select id="av-target-level" class="av-level-select"></select>
        </div>
      </div>

      <!-- Move picker -->
      <div id="av-move-section">
        <div class="av-tabs">
          <div class="av-tab active" data-tab="arts">Arts</div>
          <div class="av-tab" data-tab="skills">Skills</div>
        </div>
        <div id="av-move-list">
          <div class="av-move-empty">Select a creature to see moves.</div>
        </div>
      </div>

      <div id="av-controls">
        <button id="av-play-btn" class="av-btn primary">▶ Play</button>
        <button id="av-loop-btn" class="av-btn">⟳ Loop</button>
      </div>
    </div>

    <!-- Center: field -->
    <div id="av-field-wrap">
      <div id="av-field-container">
        <div class="battle-field" id="battle-field">
          <!-- Creatures injected by JS -->
        </div>
      </div>
    </div>

    <!-- Right panel: stats -->
    <div id="av-right">

      <div class="av-stat-block" id="av-attacker-stats">
        <div class="av-section-label" style="margin-bottom:6px">Attacker</div>
        <div style="color:#334;font-style:italic;font-size:11px">Pick a creature.</div>
      </div>

      <div class="av-stat-block" id="av-target-stats">
        <div class="av-section-label" style="margin-bottom:6px">Target</div>
        <div style="color:#334;font-style:italic;font-size:11px">Pick a creature.</div>
      </div>

      <div class="av-move-info-block" id="av-move-info">
        <div style="color:#334;font-style:italic;font-size:11px">Select a move to see details.</div>
      </div>

      <div class="av-dmg-block" id="av-dmg-estimate">
        <div class="av-dmg-header">Damage Estimate</div>
        <div style="color:#334;font-style:italic;font-size:11px">No move selected.</div>
      </div>

      <div class="av-log-block" id="av-log">
        <div class="av-log-header">Result Log</div>
      </div>

    </div>
  </div>

  <!-- ── Engine stubs (must be before engine scripts) ── -->
  <script>
    window.playSfx        = () => {};
    window.startBattleMusic = () => {};
    window.stopBattleMusic  = () => {};
    // Stub for functions used by config/state that we don't need in the viewer
    window.renderBattle   = () => {};
  </script>

  <!-- ── Class data (must load before config.js) ── -->
  <script src="scripts/class-data-core.js"></script>
  <script src="scripts/class-data-strength.js"></script>
  <script src="scripts/class-data-defense.js"></script>
  <script src="scripts/class-data-intelligence.js"></script>
  <script src="scripts/class-data-spirit.js"></script>
  <script src="scripts/class-data-speed.js"></script>

  <!-- ── Passive & skill registries ── -->
  <script src="scripts/passive-registry-core.js"></script>
  <script src="scripts/passive-registry-strength.js"></script>
  <script src="scripts/passive-registry-defense.js"></script>
  <script src="scripts/passive-registry-intelligence.js"></script>
  <script src="scripts/passive-registry-spirit.js"></script>
  <script src="scripts/passive-registry-speed.js"></script>
  <script src="scripts/skill-registry-core.js"></script>
  <script src="scripts/skill-registry-strength.js"></script>
  <script src="scripts/skill-registry-defense.js"></script>

  <script src="scripts/config.js"></script>
  <script src="scripts/state.js"></script>
  <script src="scripts/battle-engine.js"></script>

  <!-- ── Animation engine ── -->
  <script src="scripts/animation-components.js"></script>
  <script src="scripts/animation-presets.js"></script>
  <script src="scripts/animation-engine.js"></script>
  <script src="scripts/animation-state.js"></script>
  <script src="scripts/battle-animations.js"></script>

  <!-- ── Creature animations ── -->
  <script src="scripts/animations/anim-universal.js"></script>
  <script src="scripts/animations/anim-salamander.js"></script>
  <script src="scripts/animations/anim-aquaphant.js"></script>
  <script src="scripts/animations/anim-pengun.js"></script>
  <script src="scripts/animations/anim-flor.js"></script>
  <script src="scripts/animations/anim-clod.js"></script>
  <script src="scripts/animations/anim-galeon.js"></script>
  <script src="scripts/animations/anim-voltwing.js"></script>
  <script src="scripts/animations/anim-lumora.js"></script>
  <script src="scripts/animations/anim-nocthorn.js"></script>
  <script src="scripts/animations/anim-emberjaw.js"></script>
  <script src="scripts/animations/anim-tidecalf.js"></script>
  <script src="scripts/animations/anim-gravemoss.js"></script>

  <!-- ── Skill animations ── -->
  <script src="scripts/animations/anim-skills-strength.js"></script>
  <script src="scripts/animations/anim-skills-defense.js"></script>
  <script src="scripts/animations/anim-skills-intelligence.js"></script>
  <script src="scripts/animations/anim-skills-spirit.js"></script>
  <script src="scripts/animations/anim-skills-speed.js"></script>

  <!-- ── Viewer logic ── -->
  <script>
  // ── Constants ─────────────────────────────────────────────────────────────

  const SPRITE_BASE      = 80;
  const SPRITE_SCALE_NORM = 0.58;

  const SLOT_LAYOUT = {
    player:   { xPct: 31, yPct: 52, scale: 0.74 },
    opponent: { xPct: 69, yPct: 52, scale: 0.74 },
  };

  const ELEMENT_COLORS = {
    fire: '#ff7722', ice: '#66ccff', water: '#4488ff', gaia: '#66cc33',
    earth: '#cc9944', wind: '#66ffaa', light: '#ffee55', dark: '#cc66ff', neutral: '#888888',
  };

  const CATEGORY_COLORS = {
    art:     '#9966ff',
    heal:    '#44cc88',
    utility: '#6688cc',
    basic:   '#556677',
  };

  const SKILL_CAT_COLORS = {
    offensive: '#ff7755',
    setup:     '#55aacc',
    defense:   '#5577cc',
    utility:   '#9966cc',
    reaction:  '#cc7799',
  };

  // ── Viewer state ──────────────────────────────────────────────────────────

  const AV = {
    attackerCreatureId: RENTAL_ROSTER[0].id,
    attackerLevel:      30,
    targetCreatureId:   RENTAL_ROSTER[1].id,
    targetLevel:        30,
    activeTab:          'arts',
    selectedMoveId:     null,
    selectedMoveKind:   'art',   // 'art' | 'skill'
    isPlaying:          false,
    loopEnabled:        false,
    log:                [],
  };

  // ── Build viewer creature ─────────────────────────────────────────────────

  function buildViewerCreature(creatureId, level, side, slot) {
    const creature = RENTAL_ROSTER.find(c => c.id === creatureId);
    if (!creature) return null;
    const stats = resolveStats(creature, level);
    return {
      runtimeId:       `viewer-${creatureId}-${side}`,
      creatureId:      creature.id,
      displayName:     creature.name,
      element:         creature.element,
      role:            creature.role,
      level,
      slot,
      hp:              { current: stats.hp, max: stats.hp },
      mp:              { current: stats.mp, max: stats.mp },
      stats,
      resistances:     creature.resistances,
      moves:           getCreatureMoves(creatureId, level),
      sprite:          creature.sprite,
      statusEffects:   [],
      statModifiers:   [],
      isKnockedOut:    false,
      isDefending:     false,
      classRoute:      null,
      classSkills:     [],
      equippedPassives:[],
      _side:           side,
      _slot:           slot,
    };
  }

  function rebuildBattleState() {
    const attacker = buildViewerCreature(AV.attackerCreatureId, AV.attackerLevel, 'player',   'middle');
    const target   = buildViewerCreature(AV.targetCreatureId,   AV.targetLevel,   'opponent', 'middle');
    state.battleState = {
      player:       { top: null, middle: attacker, bottom: null },
      opponent:     { top: null, middle: target,   bottom: null },
      round:        1,
      arenaFile:    null,
      battleStats:  { player: {}, opponent: {} },
    };
    state.battleConfig = { level: AV.attackerLevel };
    return { attacker, target };
  }

  // ── Field rendering ───────────────────────────────────────────────────────

  function buildField() {
    const field = document.getElementById('battle-field');
    if (!field) return;
    field.innerHTML = '';

    ['player', 'opponent'].forEach(side => {
      const creatureId = side === 'player' ? AV.attackerCreatureId : AV.targetCreatureId;
      const level      = side === 'player' ? AV.attackerLevel      : AV.targetLevel;
      const creature   = RENTAL_ROSTER.find(c => c.id === creatureId);
      const lay        = SLOT_LAYOUT[side];
      const size       = Math.round(SPRITE_BASE * lay.scale / SPRITE_SCALE_NORM);
      const flip       = side === 'opponent' ? 'scaleX(-1)' : '';
      const shadowW    = Math.round(size * 0.72);
      const shadowH    = Math.round(size * 0.14);
      const spriteSrc  = creature ? `../shared/creatures/${creature.id}/${creature.id}.png` : '';

      const el = document.createElement('div');
      el.className = `battle-creature ${side}`;
      el.dataset.creature = `${side}-middle`;
      el.style.cssText = `left:${lay.xPct}%;top:${lay.yPct}%;z-index:30`;

      el.innerHTML = `
        <div class="creature-breathe-wrapper">
          <img src="${spriteSrc}" alt="${creature?.name || side}"
               style="width:${size}px;height:${size}px;transform:${flip};display:block;image-rendering:pixelated;object-fit:contain"
               onerror="this.style.cssText='width:${size}px;height:${size * 1.2}px;background:#1a1020;display:block;border-radius:4px;border:1px solid #2a2030'">
        </div>
        <div class="battle-shadow" style="width:${shadowW}px;height:${shadowH}px"></div>
      `;
      field.appendChild(el);
    });
  }

  // ── Populate dropdowns ────────────────────────────────────────────────────

  function populateCreatureDropdowns() {
    const attackerSel = document.getElementById('av-attacker-creature');
    const targetSel   = document.getElementById('av-target-creature');

    const options = RENTAL_ROSTER.map(c =>
      `<option value="${c.id}">${c.name} (${c.element})</option>`
    ).join('');

    attackerSel.innerHTML = options;
    targetSel.innerHTML   = options;

    attackerSel.value = AV.attackerCreatureId;
    targetSel.value   = AV.targetCreatureId;
  }

  function populateLevelDropdowns() {
    const options = LEVEL_TIERS.map(t =>
      `<option value="${t.level}">Lv ${t.level} — ${t.label}</option>`
    ).join('');

    ['av-attacker-level', 'av-target-level'].forEach(id => {
      document.getElementById(id).innerHTML = options;
    });
    document.getElementById('av-attacker-level').value = AV.attackerLevel;
    document.getElementById('av-target-level').value   = AV.targetLevel;
  }

  // ── Move list ─────────────────────────────────────────────────────────────

  function renderMoveList() {
    const container = document.getElementById('av-move-list');
    const creatureId = AV.attackerCreatureId;
    const level      = AV.attackerLevel;

    if (AV.activeTab === 'arts') {
      const creature = RENTAL_ROSTER.find(c => c.id === creatureId);
      const allMoves = MOVES_DATA.filter(m =>
        (m.owner === creatureId || m.owner === 'shared') && m.learnedAt <= level
      );

      const groups = [
        { key: 'art',     label: 'Arts',    moves: allMoves.filter(m => m.category === 'art') },
        { key: 'heal',    label: 'Heals',   moves: allMoves.filter(m => m.category === 'heal') },
        { key: 'utility', label: 'Utility', moves: allMoves.filter(m => m.category === 'utility') },
        { key: 'basic',   label: 'Basic',   moves: allMoves.filter(m => m.category === 'basic') },
      ].filter(g => g.moves.length > 0);

      if (groups.length === 0) {
        container.innerHTML = `<div class="av-move-empty">No moves learned yet at Lv ${level}.</div>`;
        return;
      }

      container.innerHTML = groups.map(g =>
        `<div class="av-move-group-label">${g.label}</div>` +
        g.moves.map(m => {
          const dot   = `<span class="av-move-dot" style="background:${CATEGORY_COLORS[g.key] || '#556677'}"></span>`;
          const sel   = AV.selectedMoveId === m.id ? ' selected' : '';
          const lvlTag = m.learnedAt > 1 ? `<span class="av-move-lvl">Lv${m.learnedAt}</span>` : '';
          return `<div class="av-move-item${sel}" data-id="${m.id}" data-kind="art">${dot}<span class="av-move-name">${m.name}</span>${lvlTag}</div>`;
        }).join('')
      ).join('');

    } else {
      // Skills tab: organized by stat route
      const routes = CLASS_ROUTES;
      if (!routes || routes.length === 0) {
        container.innerHTML = `<div class="av-move-empty">No class routes loaded.</div>`;
        return;
      }

      let html = '';
      routes.forEach(route => {
        const routeSkills = route.tiers.flatMap(tier => tier.skills);
        const allSkills = routeSkills
          .map(id => getClassSkill(id))
          .filter(Boolean);

        if (allSkills.length === 0) return;
        html += `<div class="av-move-group-label">${route.name}</div>`;
        html += allSkills.map(s => {
          const catColor = SKILL_CAT_COLORS[s.category] || '#8888aa';
          const dot = `<span class="av-move-dot" style="background:${catColor}"></span>`;
          const sel = AV.selectedMoveId === s.id ? ' selected' : '';
          return `<div class="av-move-item${sel}" data-id="${s.id}" data-kind="skill">${dot}<span class="av-move-name">${s.name}</span></div>`;
        }).join('');
      });

      if (!html) {
        container.innerHTML = `<div class="av-move-empty">No skills available.</div>`;
        return;
      }
      container.innerHTML = html;
    }

    // Re-attach listeners
    container.querySelectorAll('.av-move-item').forEach(el => {
      el.addEventListener('click', () => {
        AV.selectedMoveId  = el.dataset.id;
        AV.selectedMoveKind = el.dataset.kind;
        container.querySelectorAll('.av-move-item').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        updateMoveInfo();
        updateDamageEstimate();
      });
    });
  }

  // ── Stats panel ───────────────────────────────────────────────────────────

  function statRow(key, val, highlight = false) {
    return `<div class="av-stat-row"><span class="av-stat-key">${key}</span><span class="av-stat-val${highlight ? ' highlight' : ''}">${val}</span></div>`;
  }

  function renderCreatureStats(panelId, creatureId, level, labelText) {

      </div>
      <div class="av-stat-creature-role" style="margin-bottom:8px;color:#445566;font-size:10px">${creature.role} · Lv ${level}</div>
      <div class="av-stats-grid">
        ${statRow('HP',  stats.hp)}
        ${statRow('MP',  stats.mp)}
        ${statRow('STR', stats.strength)}
        ${statRow('DEF', stats.defense)}

  // ── Move info panel ───────────────────────────────────────────────────────

    return `<div class="av-move-info-row"><span class="av-move-info-key">${key}</span><span class="av-move-info-val">${val}</span></div>`;

  function updateMoveInfo() {
    const panel = document.getElementById('av-move-info');
    if (!AV.selectedMoveId) {
      panel.innerHTML = `<div style="color:#334;font-style:italic;font-size:11px">Select a move to see details.</div>`;
      return;
    }

    if (AV.selectedMoveKind === 'art') {
      const move = MOVES_DATA.find(m => m.id === AV.selectedMoveId);
      if (!move) { panel.innerHTML = `<div style="color:#aa4444;font-size:11px">Move not found.</div>`; return; }
      const elemCol = ELEMENT_COLORS[move.element] || '#888';
      const catMap  = { art: 'Art', heal: 'Heal', utility: 'Utility', basic: 'Basic' };
      panel.innerHTML = `
        <div class="av-move-info-name">${move.name}</div>
        <div class="av-move-info-desc">${move.desc}</div>
        ${renderMoveInfoRow('Category', catMap[move.category] || move.category)}
        ${renderMoveInfoRow('Element', `<span style="color:${elemCol}">${move.element}</span>`)}
        ${renderMoveInfoRow('Dmg Class', move.damageClass)}
        ${renderMoveInfoRow('Targeting', move.targeting)}
        ${renderMoveInfoRow('Base Power', move.basePower || '—')}
        ${renderMoveInfoRow('Scaling', move.offensiveScaling ? `×${move.offensiveScaling}` : '—')}
        ${renderMoveInfoRow('MP Cost', move.mpCost)}
        ${renderMoveInfoRow('Accuracy', move.accuracy + '%')}
        ${renderMoveInfoRow('Can Crit', move.canCrit ? 'Yes (5%)' : 'No')}
        ${move.applyStatus ? renderMoveInfoRow('Applies', move.applyStatus.id + (move.applyStatus.permanent ? ' (perm)' : ` (${move.applyStatus.duration}t)`)) : ''}
        ${renderMoveInfoRow('Learned at', `Lv ${move.learnedAt}`)}

      const skill = getClassSkill(AV.selectedMoveId);
      if (!skill) { panel.innerHTML = `<div style="color:#aa4444;font-size:11px">Skill not found.</div>`; return; }
      const costStr = skill.costType === 'none' ? 'None'
                    : skill.costType === 'flatMP' ? `${skill.costAmount} MP`
                    : skill.costType === 'percentMP' ? `${Math.round(skill.costAmount * 100)}% MP`
                    : skill.costType === 'flatHP' ? `${skill.costAmount} HP`
                    : skill.costType === 'percentHP' ? `${Math.round(skill.costAmount * 100)}% HP`
                    : skill.costType;
      panel.innerHTML = `
        <div class="av-move-info-name">${skill.name}</div>
        <div class="av-move-info-desc">${skill.description || ''}</div>
        ${renderMoveInfoRow('Route', skill.classRoute)}
        ${renderMoveInfoRow('Category', skill.category)}
        ${renderMoveInfoRow('Targeting', skill.targeting)}
        ${renderMoveInfoRow('Cost', costStr)}
        ${skill.tiered ? renderMoveInfoRow('Tiered', 'Yes (upgrades across tiers)') : ''}
      `;
    }
  }

  // ── Damage estimate ───────────────────────────────────────────────────────

  function calcDamageRange(attacker, target, move) {
    if (!move || move.damageClass === 'utility') return null;

    const offStat = move.damageClass === 'physical'
      ? attacker.stats.strength : attacker.stats.intelligence;
    const defStat = move.damageClass === 'physical'
      ? target.stats.defense    : target.stats.spirit;
    const levelMod = attacker.level * 0.75;
    const pressure = (offStat - defStat) * move.offensiveScaling;
    const elemMod  = getElementModifier(move.element, target);

    if (elemMod === 'absorb') {
      const rawBase = move.basePower + (move.movePowerModifier || 0) + pressure + levelMod;
      return {
        type:    'absorb',
        min:     Math.max(1, Math.round((rawBase - 2) * 0.5)),
        max:     Math.max(1, Math.round((rawBase + 4) * 0.5)),
        elemMod: 'absorb',
      };
    }

    const rawBase = move.basePower + (move.movePowerModifier || 0) + pressure + levelMod;
    const min     = Math.max(1, Math.round((rawBase - 2) * elemMod));
    const max     = Math.max(1, Math.round((rawBase + 4) * elemMod));
    const critMin = Math.max(1, Math.round(min * 1.5));
    const critMax = Math.max(1, Math.round(max * 1.5));

    let elemLabel, elemCls;
    if (elemMod === 1.5)       { elemLabel = 'Super Effective! ×1.5';  elemCls = 'em-super';    }
    else if (elemMod > 1.0)    { elemLabel = `Sub Effective ×${elemMod}`; elemCls = 'em-sub';   }
    else if (elemMod < 1.0)    { elemLabel = `Resisted ×${elemMod}`;   elemCls = 'em-sub-down'; }
    else                       { elemLabel = 'Neutral ×1.0';           elemCls = 'em-neutral';  }

    return { type: move.damageClass === 'heal' ? 'heal' : 'damage', min, max, critMin, critMax, elemMod, elemLabel, elemCls };
  }

  function updateDamageEstimate() {
    const panel = document.getElementById('av-dmg-estimate');
    const attCreature = RENTAL_ROSTER.find(c => c.id === AV.attackerCreatureId);
    const tgtCreature = RENTAL_ROSTER.find(c => c.id === AV.targetCreatureId);
    if (!attCreature || !tgtCreature || !AV.selectedMoveId) {
      panel.innerHTML = `<div class="av-dmg-header">Damage Estimate</div><div style="color:#334;font-style:italic;font-size:11px">No move selected.</div>`;
      return;
    }

    const attStats = resolveStats(attCreature, AV.attackerLevel);
    const tgtStats = resolveStats(tgtCreature, AV.targetLevel);
    const fakeAttacker = { level: AV.attackerLevel, stats: attStats, element: attCreature.element, equippedPassives: [], statModifiers: [] };
    const fakeTarget   = { level: AV.targetLevel,   stats: tgtStats, element: tgtCreature.element, resistances: tgtCreature.resistances, isDefending: false, equippedPassives: [], statModifiers: [] };

    let move = null;
    if (AV.selectedMoveKind === 'art') {
      move = MOVES_DATA.find(m => m.id === AV.selectedMoveId);
    } else {
      // Skills: for offensive ones we approximate using a simplified model
      const skill = getClassSkill(AV.selectedMoveId);
      if (skill && skill.category !== 'offensive' && skill.category !== 'reaction') {
        panel.innerHTML = `
          <div class="av-dmg-header">Damage Estimate</div>
          <div class="av-dmg-row"><span class="av-dmg-label">Effect</span><span class="av-dmg-value utility">${skill.category === 'setup' ? 'Stat change' : 'Utility'}</span></div>
          <div style="color:#334;font-size:11px;margin-top:4px">No direct damage — check animation for visual effect.</div>
        `;
        return;
      }
      // For offensive skills, try to approximate with basic attack power
      move = { damageClass: 'physical', element: attCreature.element, basePower: 20, offensiveScaling: 1.0, movePowerModifier: 0, canCrit: true };
      if (skill) {
        move = { ...move, basePower: skill.basePower || 20, offensiveScaling: skill.offensiveScaling || 1.0, movePowerModifier: skill.movePowerModifier || 0 };
      }
    }

    if (!move) {
      panel.innerHTML = `<div class="av-dmg-header">Damage Estimate</div><div style="color:#334;font-style:italic;font-size:11px">No data.</div>`;
      return;
    }

    const r = calcDamageRange(fakeAttacker, fakeTarget, move);
    if (!r) {
      panel.innerHTML = `
        <div class="av-dmg-header">Damage Estimate</div>
        <div class="av-dmg-row"><span class="av-dmg-label">Effect</span><span class="av-dmg-value utility">Utility / No damage</span></div>
      `;
      return;
    }

    if (r.type === 'absorb') {
      panel.innerHTML = `
        <div class="av-dmg-header">Damage Estimate</div>
        <div class="av-dmg-row"><span class="av-dmg-label">Type</span><span class="av-dmg-value absorb">Absorbed (same element)</span></div>
        <div class="av-dmg-row"><span class="av-dmg-label">Heal range</span><span class="av-dmg-value heal">+${r.min} – +${r.max}</span></div>
      `;
      return;
    }

    if (r.type === 'heal') {
      panel.innerHTML = `
        <div class="av-dmg-header">Damage Estimate</div>
        <div class="av-dmg-row"><span class="av-dmg-label">Heal range</span><span class="av-dmg-value heal">+${r.min} – +${r.max}</span></div>
      `;
      return;
    }

    const offLabel = move.damageClass === 'physical' ? 'STR vs DEF' : 'INT vs SPI';
    const offVal   = move.damageClass === 'physical'
      ? `${attStats.strength} vs ${tgtStats.defense}`
      : `${attStats.intelligence} vs ${tgtStats.spirit}`;

    panel.innerHTML = `
      <div class="av-dmg-header">Damage Estimate</div>
      <div class="av-dmg-row"><span class="av-dmg-label">Range</span><span class="av-dmg-value dmg">${r.min} – ${r.max}</span></div>
      <div class="av-dmg-row"><span class="av-dmg-label">Crit (5%)</span><span class="av-dmg-value crit">${r.critMin} – ${r.critMax}</span></div>
      <div class="av-dmg-row"><span class="av-dmg-label">${offLabel}</span><span class="av-dmg-value" style="color:#6688aa">${offVal}</span></div>
      <div style="margin-top:6px">
        <span class="av-elem-modifier">
          <span class="av-elem-modifier-badge ${r.elemCls}">${r.elemLabel}</span>
        </span>
      </div>
    `;
  }

  // ── Result log ────────────────────────────────────────────────────────────

  function addLog(moveId, result) {
    const moveName = AV.selectedMoveKind === 'art'
      ? (MOVES_DATA.find(m => m.id === moveId)?.name || moveId)
      : (getClassSkill(moveId)?.name || moveId);

    let cls = 'log-result', text = '?';
    if (result?.type === 'damage')  { cls = result.isCrit ? 'log-crit' : 'log-result'; text = `${result.amount} dmg${result.isCrit ? ' (CRIT)' : ''}`; }
    else if (result?.type === 'crit') { cls = 'log-crit'; text = `${result.amount} CRIT`; }
    else if (result?.type === 'heal') { cls = 'log-result'; text = `+${result.amount} HP`; }
    else if (result?.type === 'absorb') { cls = 'log-absorb'; text = `absorbed (+${result.amount})`; }
    else if (result?.type === 'miss')  { cls = 'log-miss'; text = 'MISS'; }
    else if (result?.type === 'multi') { cls = 'log-result'; text = result.hits.map(h => h.amount || 'miss').join(', '); }
    else if (result?.type === 'multi_hit') { cls = 'log-result'; text = result.hits.map(h => h.damage || 'miss').join(', '); }
    else if (result)                   { cls = 'log-result'; text = result.type || '—'; }

    AV.log.unshift({ moveName, cls, text });
    if (AV.log.length > 10) AV.log.pop();

    const logEl = document.getElementById('av-log');
    const entries = AV.log.map(e =>
      `<div class="av-log-entry"><span class="log-move">${e.moveName}</span><span class="${e.cls}">${e.text}</span></div>`
    ).join('');
    logEl.innerHTML = `<div class="av-log-header">Result Log</div>${entries}`;
  }

  // ── Play animation ────────────────────────────────────────────────────────

  function play() {
    if (AV.isPlaying || !AV.selectedMoveId) return;

    const { attacker, target } = rebuildBattleState();
    AV.isPlaying = true;
    setPlayBtnState(true);

    const result = {
      type:       'damage',
      targetSide: 'opponent',
      targetSlot: 'middle',
      actorSide:  'player',
      actorSlot:  'middle',
      amount:     0,
    };

    const action = {
      actorSide:   'player',
      actorSlot:   'middle',
      targetSide:  'opponent',
      targetSlot:  'middle',
      moveId:      AV.selectedMoveId,
      commandType: AV.selectedMoveKind === 'art' ? 'art' : 'skill',
    };

    const options = {
      onImpact: () => {
        const move = AV.selectedMoveKind === 'art'
          ? MOVES_DATA.find(m => m.id === AV.selectedMoveId)
          : null;

        if (!move) {
          // Class skill: distinguish offensive vs. setup/utility
          const skill = getClassSkill(AV.selectedMoveId);
          if (skill && (skill.category === 'offensive' || skill.category === 'reaction')) {
            const offStat = attacker.stats.strength;
            const defStat = target.stats.defense;
            const pressure = (offStat - defStat) * 1.0;
            const levelMod = attacker.level * 0.75;
            const randMod  = Math.floor(Math.random() * 7) - 2;
            const estimated = Math.max(1, Math.round(20 + pressure + levelMod + randMod));
            result.type       = 'damage';
            result.targetSide = 'opponent';
            result.targetSlot = 'middle';
            result.amount     = estimated;
          } else {
            result.type       = 'utility';
            result.targetSide = action.actorSide;
            result.targetSlot = action.actorSlot;
            result.statusText = skill?.category === 'setup' ? 'BUFF' : 'SKILL';
          }
          return result;
        }

        if (move.damageClass === 'utility') {
          const selfTargeting = move.targeting === 'self' || move.targeting === 'single_ally' || move.targeting === 'all_allies';
          // Run the real utility effect on a clone to get the correct display text
          // (e.g. cleanse returns 'CLEANSED'/'ALL CLEAR', not 'BUFF')
          const effectTarget = selfTargeting ? attacker : target;
          const cloned = JSON.parse(JSON.stringify(effectTarget));
          const statusText = applyUtilityMove(move.id, cloned)
            ?? move.applyStatus?.id?.toUpperCase()
            ?? (selfTargeting ? 'BUFF' : 'STATUS');
          result.type       = 'utility';
          result.targetSide = selfTargeting ? action.actorSide : action.targetSide;
          result.targetSlot = selfTargeting ? action.actorSlot : action.targetSlot;
          result.statusText = statusText;
          return result;
        }

        if (move.damageClass === 'heal') {
          const amount = Math.max(1,
            Math.round(move.basePower + target.stats.spirit * move.offensiveScaling + attacker.level * 0.75 + (Math.random() * 6 - 2))
          );
          result.type       = 'heal';
          result.targetSide = action.actorSide;
          result.targetSlot = action.actorSlot;
          result.amount     = amount;
          return result;
        }

        // Damage calc
        const dmgResult = calcDamage(attacker, target, move);
        if (dmgResult.elemMod === 'absorb') {
          result.type       = 'absorb';
          result.targetSide = 'opponent';
          result.targetSlot = 'middle';
          result.amount     = dmgResult.healAmount;
          return result;
        }

        result.type       = dmgResult.isCrit ? 'crit' : 'damage';
        result.targetSide = 'opponent';
        result.targetSlot = 'middle';
        result.amount     = dmgResult.damage;
        result.isCrit     = dmgResult.isCrit;
        result.elemMod    = dmgResult.elemMod;
        return result;
      },
    };

    playMoveAnimation(result, action, finalResult => {
      addLog(AV.selectedMoveId, finalResult || result);
      AV.isPlaying = false;
      setPlayBtnState(false);
      if (AV.loopEnabled) setTimeout(play, 700);
    }, options);
  }

  function setPlayBtnState(playing) {
    const btns = [document.getElementById('av-play'), document.getElementById('av-play-btn')];
    btns.forEach(b => {
      if (!b) return;
      b.textContent = playing ? '◼ Stop' : '▶ Play';
      b.classList.toggle('active', playing);
    });
  }

  // ── Wire up events ────────────────────────────────────────────────────────

  function refreshAll() {
    buildField();
    renderCreatureStats('av-attacker-stats', AV.attackerCreatureId, AV.attackerLevel, 'Attacker');
    renderCreatureStats('av-target-stats',   AV.targetCreatureId,   AV.targetLevel,   'Target');
    renderMoveList();
    updateMoveInfo();
    updateDamageEstimate();
    rebuildBattleState();
  }

  document.getElementById('av-attacker-creature').addEventListener('change', e => {
    AV.attackerCreatureId = e.target.value;
    AV.selectedMoveId = null;
    refreshAll();
  });
  document.getElementById('av-attacker-level').addEventListener('change', e => {
    AV.attackerLevel = parseInt(e.target.value);
    AV.selectedMoveId = null;
    refreshAll();
  });
  document.getElementById('av-target-creature').addEventListener('change', e => {
    AV.targetCreatureId = e.target.value;
    refreshAll();
  });
  document.getElementById('av-target-level').addEventListener('change', e => {
    AV.targetLevel = parseInt(e.target.value);
    refreshAll();
  });

  document.getElementById('av-swap-btn').addEventListener('click', () => {
    [AV.attackerCreatureId, AV.targetCreatureId] = [AV.targetCreatureId, AV.attackerCreatureId];
    [AV.attackerLevel, AV.targetLevel]           = [AV.targetLevel, AV.attackerLevel];
    document.getElementById('av-attacker-creature').value = AV.attackerCreatureId;
    document.getElementById('av-attacker-level').value    = AV.attackerLevel;
    document.getElementById('av-target-creature').value   = AV.targetCreatureId;
    document.getElementById('av-target-level').value      = AV.targetLevel;
    AV.selectedMoveId = null;
    refreshAll();
  });

  document.querySelectorAll('.av-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.av-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      AV.activeTab = tab.dataset.tab;
      AV.selectedMoveId = null;
      renderMoveList();
      updateMoveInfo();
      updateDamageEstimate();
    });
  });

  // Deduped play/loop/reset handlers for both header and panel buttons
  function onPlay() {
    if (!AV.isPlaying) play();
  }
  function onLoop() {
    AV.loopEnabled = !AV.loopEnabled;
    document.getElementById('av-loop').classList.toggle('active', AV.loopEnabled);
    document.getElementById('av-loop-btn').classList.toggle('active', AV.loopEnabled);
  }
  function onReset() {
    buildField();
  }

  document.getElementById('av-play').addEventListener('click',    onPlay);
  document.getElementById('av-play-btn').addEventListener('click', onPlay);
  document.getElementById('av-loop').addEventListener('click',    onLoop);
  document.getElementById('av-loop-btn').addEventListener('click', onLoop);
  document.getElementById('av-reset').addEventListener('click',   onReset);

  // ── Boot ──────────────────────────────────────────────────────────────────

  populateCreatureDropdowns();
  populateLevelDropdowns();
  refreshAll();
  </script>

</body>
</html>
