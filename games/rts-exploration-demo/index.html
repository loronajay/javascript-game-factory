<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RTS Exploration Engine v0</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main id="app">
    <canvas id="game" width="1280" height="720" aria-label="RTS Exploration Engine canvas"></canvas>
    <section id="hud" class="game-hud" aria-label="Game HUD"></section>
    <aside id="debug-hud" class="debug-hud" aria-label="Diagnostics" hidden>
      <div class="debug-heading">Diagnostics <kbd>F3</kbd></div>
      <div id="debug-lines"></div>
    </aside>
  </main>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
