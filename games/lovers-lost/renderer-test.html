<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lovers Lost — Renderer Test</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #controls {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: #9966cc;
      font: 12px monospace;
      text-align: center;
      line-height: 1.8;
      pointer-events: none;
    }
    #debug {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: #cc88ff;
      font: 11px monospace;
      text-align: center;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="debug"></div>

  <div id="controls">
    <b>SPACE</b> pause &nbsp;|&nbsp;
    <b>← →</b> scrub distance &nbsp;|&nbsp;
    <b>SHIFT+← →</b> jump 1 wave &nbsp;|&nbsp;
    <b>↑ ↓</b> advance speed<br>
    <b>Z</b> run &nbsp;
    <b>X</b> jump &nbsp;
    <b>C</b> crouch &nbsp;
    <b>V</b> attack &nbsp;
    <b>B</b> block &nbsp;
    <b>N</b> hit &nbsp;
    <b>M</b> finished
  </div>

  <script src="renderer.js"></script>
  <script>
    // ─── Wave start positions (mirrored from obstacles.js) ────────────────────
    const WAVE_STARTS = [0, 420, 1020, 1770, 2720, 3820];
    const ENV_NAMES_BOY  = ['Cave', 'Enchanted Forest', 'Stormy Cliffs', 'Sunken Ruins', 'Night Sky'];
    const ENV_NAMES_GIRL = ['Desert Ruins', 'Frozen Tundra', 'Lava Fields', 'Castle Halls', 'Night Sky'];

    function envIndex(dist) {
      if (dist < 1020) return 0;
      if (dist < 1770) return 1;
      if (dist < 2720) return 2;
      if (dist < 3820) return 3;
      return 4;
    }

    // ─── Images ───────────────────────────────────────────────────────────────
    const images = {
      boy: new Image(), girl: new Image(), sword: new Image(),
      birds: [new Image(), new Image(), new Image()],
    };
    images.boy.src        = 'images/boy.png';
    images.girl.src       = 'images/girl.png';
    images.sword.src      = 'images/SHORT SWORD.png';
    images.birds[0].src   = 'images/red1.png';
    images.birds[1].src   = 'images/red2.png';
    images.birds[2].src   = 'images/red3.png';

    // ─── Renderer ─────────────────────────────────────────────────────────────
    const canvas   = document.getElementById('gameCanvas');
    const renderer = createRenderer(canvas, images);

    // ─── State ────────────────────────────────────────────────────────────────
    let distance    = 0;
    let advanceRate = 1.0;   // distance units per frame
    let paused      = false;
    let playerState = 'running';
    let elapsed     = 0;
    let jumpTick    = 0;       // frame counter for simulated jump arc

    const JUMP_DURATION = 36;   // frames (matches ~0.6s at 60fps)
    const JUMP_HEIGHT   = 80;   // pixels at peak

    // ─── Mock data ────────────────────────────────────────────────────────────
    function makePlayer(side, dist, state) {
      let jumpY = 0;
      if (state === 'jumping') {
        // Parabolic arc: sin curve over JUMP_DURATION frames
        const t = Math.min(jumpTick / JUMP_DURATION, 1);
        jumpY = Math.sin(t * Math.PI) * JUMP_HEIGHT;
      }
      return {
        side,
        speed:          10,
        score:          Math.floor(dist * 2.8),
        distance:       dist,
        chain:          3,
        obstaclesFaced: Math.floor(dist / 52),
        state,
        assistActive:   false,
        jumpY,
      };
    }

    // Always show one of each obstacle type spaced ahead, plus a windup goblin
    function makeObstacles(dist) {
      return [
        { type: 'spikes',    distance: dist + 30,  cleared: false, phase: null },
        { type: 'bird',      distance: dist + 65,  cleared: false, phase: null },
        { type: 'arrowwall', distance: dist + 100, cleared: false, phase: null },
        { type: 'goblin',    distance: dist + 135, cleared: false, phase: 'attack' },
        { type: 'goblin',    distance: dist + 175, cleared: false, phase: 'windup' },
      ];
    }

    function makeBoosts(dist) {
      return [{ distance: dist + 50, collected: false }];
    }

    // ─── Input ────────────────────────────────────────────────────────────────
    window.addEventListener('keydown', e => {
      const WAVE_JUMP = 600;

      switch (e.code) {
        case 'Space':      paused = !paused;            break;
        case 'ArrowRight': distance += e.shiftKey ? WAVE_JUMP : 50; break;
        case 'ArrowLeft':  distance = Math.max(0, distance - (e.shiftKey ? WAVE_JUMP : 50)); break;
        case 'ArrowUp':    advanceRate = Math.min(6, advanceRate + 0.5); break;
        case 'ArrowDown':  advanceRate = Math.max(0.1, advanceRate - 0.5); break;
        case 'KeyZ':       playerState = 'running';   break;
        case 'KeyX':       playerState = 'jumping'; jumpTick = 0; break;
        case 'KeyC':       playerState = 'crouching'; break;
        case 'KeyV':       playerState = 'attacking'; break;
        case 'KeyB':       playerState = 'blocking';  break;
        case 'KeyN':       playerState = 'hit';       break;
        case 'KeyM':       playerState = 'finished';  break;
      }

      // Clamp to valid run distance
      distance = Math.min(distance, 5400);
      e.preventDefault();
    });

    // ─── Debug overlay ────────────────────────────────────────────────────────
    const dbg = document.getElementById('debug');
    function updateDebug() {
      const ei   = envIndex(distance);
      const wave = WAVE_STARTS.findIndex((s, i) =>
        distance >= s && (i === WAVE_STARTS.length - 1 || distance < WAVE_STARTS[i + 1])
      );
      dbg.textContent =
        `dist: ${Math.floor(distance).toString().padStart(4, '0')} / 5400  |  ` +
        `wave: ${wave === 0 ? 'warmup' : wave}  |  ` +
        `boy: ${ENV_NAMES_BOY[ei]}  |  girl: ${ENV_NAMES_GIRL[ei]}  |  ` +
        `state: ${playerState}  |  speed: ×${advanceRate.toFixed(1)}` +
        (paused ? '  |  PAUSED' : '');
    }

    // ─── Loop ─────────────────────────────────────────────────────────────────
    function loop() {
      if (!paused) {
        distance = Math.min(distance + advanceRate, 5400);
        elapsed  = distance / (60 * 1);   // rough elapsed time approximation
        if (playerState === 'jumping') {
          jumpTick++;
          if (jumpTick >= JUMP_DURATION) { jumpTick = 0; playerState = 'running'; }
        }
      }

      const boy  = makePlayer('boy',  distance, playerState);
      const girl = makePlayer('girl', distance, playerState);
      const obs  = makeObstacles(distance);
      const bst  = makeBoosts(distance);

      renderer.renderPlay(boy, girl, obs, obs, bst, bst, elapsed);
      updateDebug();
      requestAnimationFrame(loop);
    }

    // Start once at least one image loads (others use error fallback)
    let ready = 0;
    function onReady() { if (++ready === 1) loop(); }
    images.boy.onload    = onReady;
    images.boy.onerror   = onReady;
    images.girl.onload   = () => {};
    images.girl.onerror  = () => {};
    images.sword.onload  = () => {};
    images.sword.onerror = () => {};
  </script>
</body>
</html>
