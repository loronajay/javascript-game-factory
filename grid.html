<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Javascript Game Factory | Game Floor</title>
  <link rel="stylesheet" href="css/arcade.css">
  <link rel="stylesheet" href="css/grid.css">
</head>
<body>
  <div class="scanlines"></div>
  <div class="crt-overlay"></div>

  <main class="arcade-shell">
    <div class="page-topbar">
      <a class="back-link" href="index.html">&#x276E; Back To Factory</a>
      <div class="page-indicator" id="pageIndicator">1 / 1</div>
    </div>

    <section class="page-header">
      <p class="eyebrow">Factory Floor</p>
      <h1>Game Floor</h1>
    </section>

    <div class="floor-bar">
      <span class="floor-bar-label">Now Playing</span>
      <span class="floor-bar-count" id="floorCount"></span>
    </div>

    <div class="grid-frame">
      <div id="emptyState" class="empty-state" hidden>
        No cabinets are registered yet.
      </div>
      <div id="gridTrack"></div>
    </div>

    <div class="pager-row">
      <button id="prevPage" class="pager-button" type="button" hidden>&#x276E; Prev</button>
      <button id="nextPage" class="pager-button" type="button" hidden>Next &#x276F;</button>
    </div>
  </main>

  <script src="js/arcade-input.js"></script>
  <script type="module" src="js/arcade-grid.mjs"></script>
</body>
</html>
